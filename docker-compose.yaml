services:

  # ─── MySQL Database ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wain_db}
      MYSQL_USER: ${MYSQL_USER:-wain_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Backend (Node.js + Express + Prisma) ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', (res) => { if (res.statusCode !== 200) process.exit(1); process.exit(0); }).on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-wain_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-wain_db}
      JWT_SECRET: ${JWT_SECRET}
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET}
      WA_SESSION_DIR: /app/wa-sessions
      WA_LOG_LEVEL: ${WA_LOG_LEVEL:-info}
    volumes:
      - uploads_data:/app/uploads
      - wa_sessions:/app/wa-sessions
    # Run prisma db push before starting the app to sync schema directly
    command: >
      sh -c "npx prisma db push && node src/app.js"

  # ─── Frontend (React/Vite built → Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  uploads_data:
  wa_sessions:
